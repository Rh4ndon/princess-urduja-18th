<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Princess Urduja Vercaza — 18th Birthday RSVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="invite-body index-body">
  <main class="invite-shell">
    <article class="invite-card" style="margin-bottom: -25px;">
      <div class="invite-header">
        <img src="images/index/head.png" alt="" aria-hidden="true">
      </div>
      <div class="invite-card-body" style="margin-top: 80px;">
        <header class="hero">
          <h1 class="script hero-name">You are invited</h1>
          <div class="mail">
            <img src="images/index/mail.png" alt="" aria-hidden="true">
          </div>
        </header>  
        <p class="closing script">Click to Open!</p>
      </div>
      <div class="invite-footer">
        <img src="images/index/foot.png" alt="" aria-hidden="true">
      </div>
    </article>

  </main>

  <div class="floral-overlay" id="floral-overlay">
    <div class="floral-message">Opening your invitation…</div>
  </div>

  <script>
    document.querySelector('.mail').addEventListener('click', function (e) {
      e.preventDefault();
      var overlay = document.getElementById('floral-overlay');
      for (var i = 0; i < 30; i++) {
        var petal = document.createElement('div');
        petal.className = 'floral-petal';
        petal.style.left = Math.random() * 100 + '%';
        petal.style.animationDelay = Math.random() * 1.2 + 's';
        petal.style.animationDuration = (2.2 + Math.random() * 1.2) + 's';
        overlay.appendChild(petal);
      }
      overlay.classList.add('active');
      setTimeout(function () {
        window.location.href = 'invitation.html';
      }, 2000);
    });
  </script>

</body>
</html>
